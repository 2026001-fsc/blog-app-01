<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ</title>
</head>

<body>
    <div class="top">
        <a class="link" href="/blog/new">投稿</a><br>
        <a class="link" href="/blog">ホーム</a>

    </div>
    <div>
        <ul th:if="${not #lists.isEmpty(reports)}">
            <li th:each="blog:${reports}">
                    <span th:text="${blog.getTitle()}">ブログタイトル</span>
                    <span th:text="${blog.getTexe()}">本文</span>
            </li>
        </ul>
        <p th:if="${#lists.isEmpty(report)}">
            記事がありません
        </p>
    </div>
</body>

</html>
