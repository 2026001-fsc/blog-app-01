<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>ブログ一覧</title>
</head>

<body>

    <div class="top">
        <a class="link" th:href="@{/blog/new}">新規投稿</a><br>
        <a class="link" th:href="@{/blogs}">ホーム</a>
    </div>

    <hr>

    <div>
        <ul th:if="${not #lists.isEmpty(blogs)}">
            <li th:each="blog : ${blogs}">
                <h3>
                    <a th:href="@{/blogs/{id}(id=${blog.id})}" th:text="${blog.title}">ブログタイトル</a>
                </h3>
                <p th:text="${blog.text}">本文のプレビューがここに表示されます。</p>
            </li>
        </ul>

        <p th:if="${#lists.isEmpty(blogs)}">
            記事がありません。
        </p>
    </div>

</body>

</html>
