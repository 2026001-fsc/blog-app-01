<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('本の詳細')}"></head>
<body>
  <h1 th:text="${book.title}">こころ</h1>
  <p>価格: <span th:text="${book.price}">473</span>円</p>
  <p>在庫: <span th:text="${book.stock}">5</span></p>
  <a th:href="@{/books/{id}/edit(id=${book.id})}">編集</a>
  <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post">
  <button type="submit">削除</button>
</form>
</body>
</html>
