<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>投稿</title>
</head>

<body>
    <div class="top">
        <a class="link" href="/blog/new">投稿</a><br>
        <a class="link" href="/blog">ホーム</a>
    </div>
    <form action="/blogs" method="post">
        <h1 class="blog-title">投稿</h1>
        <label for="title">タイトル</label>
        <input type="text" id="title" name="title" placeholder="入力してください"><br>
        <label for="text">本文</label>
        <input type="text" id="text" name="text" placeholder="入力してください"><br>
        <button type="submit">保存</button>
    </form>
</body>

</html>
